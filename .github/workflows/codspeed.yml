name: CodSpeed Benchmarks

on:
  push:
    branches: [main]
  pull_request:
  # Allow running the benchmarks manually from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read # required for actions/checkout
  id-token: write # required for OIDC authentication with CodSpeed

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The CodSpeed JMH fork is vendored as a git submodule (with nested
          # submodules), so a recursive checkout is required.
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          working-directory: benchmarks
          run: ./gradlew jmh
