name: Issue Resolution Tracker

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [closed, synchronize]

jobs:
  resolve:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Get recent diff (safe)
        id: diff
        shell: bash
        run: |
          git fetch origin main

          # safe random delimiter (fixes EOF collision issue)
          DELIM="DIFF_$(date +%s%N)"

          {
            echo "diff<<$DELIM"
            git diff origin/main
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Run AI inference
        id: ai
        uses: actions/ai-inference@v2.1.1
        with:
         model: openai/gpt-4o-mini
         prompt: |
            You are an issue resolution detector.

            ISSUE TITLE:
            ${{ github.event.issue.title }}

            ISSUE BODY:
            ${{ github.event.issue.body }}

            CODE DIFF:
            ${{ steps.diff.outputs.diff }}

            Decide if the issue is resolved by the current changes.

            Respond ONLY in JSON:
            {
              "resolved": true,
              "reason": "...",
              "confidence": 0-100
            }

      - name: Evaluate and act on result (safe parsing)
        shell: bash
        env:
          RESPONSE: ${{ steps.ai.outputs.response }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$RESPONSE"

          RESOLVED=$(echo "$RESPONSE" | jq -r '.resolved // false')
          REASON=$(echo "$RESPONSE" | jq -r '.reason // "no reason provided"')

          if [ "$RESOLVED" = "true" ]; then
            gh issue comment "$ISSUE_NUMBER" \
              --body "✅ Issue automatically detected as resolved.\n\nReason:\n$REASON"

            gh issue close "$ISSUE_NUMBER"
          else
            echo "Issue still active: $REASON"
          fi
