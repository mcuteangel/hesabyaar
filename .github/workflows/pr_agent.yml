name: PR Agent (Gemini 3.1 Flash Lite)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: |
      github.event.sender.type != 'Bot' &&
      (github.event_name != 'issue_comment' || 
        (startsWith(github.event.comment.body, '/') && 
         (github.event.comment.author_association == 'OWNER' || 
          github.event.comment.author_association == 'COLLABORATOR' || 
          github.event.comment.author_association == 'MEMBER')))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent
    steps:
      - name: PR Agent action step
        id: pragent
        uses: docker://pragent/pr-agent:0.37.0-github_action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # استفاده از ساختار استاندارد دبل‌آندراسکور برای لایه داکر
          CONFIG__MODEL: "gemini/gemini-3.1-flash-lite"
          CONFIG__FALLBACK_MODELS: '["google/gemma-4-31b"]'
          
          # تنظیمات ابزارها و اکشن‌های مجاز
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG__AUTO_IMPROVE: "true"
          GITHUB_ACTION_CONFIG__PR_ACTIONS: '["opened", "reopened", "ready_for_review", "synchronize", "review_requested"]' 
