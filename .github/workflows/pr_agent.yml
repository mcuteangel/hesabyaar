name: PR Agent (Gemini 3.1 Flash Lite)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: |
      github.event.sender.type != 'Bot' &&
      (github.event_name != 'issue_comment' || 
        (startsWith(github.event.comment.body, '/') && 
         (github.event.comment.author_association == 'OWNER' || 
          github.event.comment.author_association == 'COLLABORATOR' || 
          github.event.comment.author_association == 'MEMBER')))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@v0.38.0
env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          # تنظیمات مدل با حروف کوچک منطبق بر داکیومنت
          config.model: "gemini/gemini-3.1-flash-lite"
          config.fallback_models: '["google/gemma-4-31b"]'
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          config.custom_model_max_tokens: "128000"
          
          # ابزارهای خودکار زمان باز شدن پی‌آر
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          
