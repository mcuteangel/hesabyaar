name: AI Issue OS v2 (Self-Healing + Context-Aware Manual)

on:
  push:
  pull_request:
    types: [closed, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # ==========================================
  # JOB 1: SELF-HEALING (FULLY RESTORED)
  # ==========================================
  ai_os_v2:
    if: github.event_name != 'issue_comment' && github.event_name != 'pull_request_review_comment'
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read
      pull-requests: read

    env:
      HAS_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Fetch issues
        id: issues
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: "all", per_page: 100, sort: "updated", direction: "desc"
            });
            return issues.filter(i => !i.pull_request).slice(0, 200).map(i => ({
              number: i.number, title: i.title, body: (i.body || "").slice(0, 500),
              state: i.state, updated_at: i.updated_at
            }));

      - name: Issue intelligence engine
        id: intel
        env: { ISSUES_JSON: ${{ steps.issues.outputs.result }} }
        run: |
          python3 - << 'EOF' > intel.json
          import json, hashlib, os
          from collections import defaultdict
          issues = json.loads(os.environ["ISSUES_JSON"])
          clusters, enriched = {}, []
          for i in issues:
              text = (i["title"] + i["body"]).lower()
              sig = hashlib.md5(text.encode()).hexdigest()[:10]
              labels = []
              if any(k in text for k in ["bug","error","crash","fail"]): labels.append("bug")
              if any(k in text for k in ["feature","add","support"]): labels.append("feature")
              if any(k in text for k in ["security","auth","token"]): labels.append("security")
              enriched.append({"issue": i["number"], "signature": sig, "labels": labels, "updated_at": i.get("updated_at", ""), "title": i["title"], "body_summary": i["body"][:200] if i["body"] else ""})
              clusters.setdefault(sig[:6], []).append(i["number"])
          label_counts = defaultdict(int)
          for issue in enriched:
              for label in issue["labels"]: label_counts[label] += 1
          sorted_issues = sorted(enriched, key=lambda x: x.get("updated_at", ""), reverse=True)
          recent_clusters = {}
          for issue in sorted_issues[:5]:
              key = issue["signature"][:6]
              if key not in recent_clusters:
                  recent_clusters[key] = {"issues": clusters.get(key, []), "sample_labels": issue["labels"], "title": issue["title"], "body_summary": issue["body_summary"]}
          print(json.dumps({"cluster_count": len(clusters), "issue_count": len(enriched), "label_distribution": dict(label_counts), "recent_clusters": recent_clusters}))
          EOF

      - name: Rule engine
        id: rule
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
            DIFF_FILTER="-- src/ lib/ app/"
            if [[ "$BASE" == "0000000000000000000000000000000000000000" ]]; then BASE="HEAD~1"; fi
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            DIFF_FILTER=""
          fi

          git diff "$BASE" "$HEAD" $DIFF_FILTER > diff_full.txt
          KEYWORDS="fix|bug|error|null|undefined|auth|crash|fail|exception|throw|catch"
          
          if grep -Eqi "$KEYWORDS" diff_full.txt; then
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "trigger=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          { head -n 500 diff_full.txt; echo "... [TRUNCATED] ..."; tail -n 500 diff_full.txt; } > diff.txt

      - name: Gemini reasoning
        if: steps.rule.outputs.trigger == 'true' && env.HAS_GEMINI_KEY == 'true'
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489
        id: gemini
        env: { GEMINI_CLI_TRUST_WORKSPACE: "true" }
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.1-flash-lite
          prompt: |
            You are a GitHub AI system.
            Context:
            - Issue intelligence summary:
            $(cat intel.json)
            - Code diff (truncated):
            $(cat diff.txt)

            Tasks:
            1. Detect resolved issues based on diff content
            2. Detect regressions (previously fixed issues that broke again)
            3. Suggest labels (bug/feature/security/refactor)

            Output ONLY valid JSON:
            {"resolved": [1], "reopen": [], "labels": {"1": ["bug"]}, "reason": "Brief explanation"}

      - name: Apply issue updates
        if: steps.gemini.outputs.summary != '' && github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESPONSE: ${{ steps.gemini.outputs.summary }}
          ISSUES_JSON: ${{ steps.issues.outputs.result }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then exit 0; fi

          REASON=$(echo "$RESPONSE" | jq -r '.reason // "No reason provided"')
          OPEN_IDS=$(jq -r '.[] | select(.state == "open") | .number' <<< "$ISSUES_JSON")
          CLOSED_IDS=$(jq -r '.[] | select(.state == "closed") | .number' <<< "$ISSUES_JSON")

          RESOLVED=$(echo "$RESPONSE" | jq -r 'if (.resolved | type) == "array" then .resolved[:5][]? else empty end')
          REOPEN=$(echo "$RESPONSE" | jq -r 'if (.reopen | type) == "array" then .reopen[:5][]? else empty end')
          LABELS_JSON=$(echo "$RESPONSE" | jq -r 'if (.labels | type) == "object" then .labels else {} end')

          OVERLAPS="" RESOLVED_CLEAN="" REOPEN_CLEAN=""
          for i in $RESOLVED; do echo "$REOPEN" | grep -qxF "$i" && OVERLAPS="$OVERLAPS $i" || RESOLVED_CLEAN="$RESOLVED_CLEAN $i"; done
          for i in $REOPEN; do echo "$RESOLVED" | grep -qxF "$i" || REOPEN_CLEAN="$REOPEN_CLEAN $i"; done

          for i in $RESOLVED_CLEAN; do
            if [[ ! "$i" =~ ^[0-9]+$ ]] || ! echo "$OPEN_IDS" | grep -qxF "$i"; then continue; fi
            COMMIT_LINK="[${SHORT_SHA:0:7}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            gh issue comment "$i" --body "✅ Auto-resolved by AI OS v2 (Triggered by commit ${COMMIT_LINK})\n> ${REASON}"
            gh issue close "$i"
          done

          for i in $REOPEN_CLEAN; do
            if [[ ! "$i" =~ ^[0-9]+$ ]] || ! echo "$CLOSED_IDS" | grep -qxF "$i"; then continue; fi
            COMMIT_LINK="[${SHORT_SHA:0:7}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            gh issue comment "$i" --body "⚠️ Regression detected - re-opening issue (Triggered by commit ${COMMIT_LINK})\n> ${REASON}"
            gh issue reopen "$i"
          done

          for i in $(echo "$LABELS_JSON" | jq -r 'keys[]'); do
            if [[ ! "$i" =~ ^[0-9]+$ ]] || ! echo "$OPEN_IDS $CLOSED_IDS" | grep -qxF "$i"; then continue; fi
            LABELS=$(echo "$LABELS_JSON" | jq -r ".\"$i\" | join(\",\")")
            [ -n "$LABELS" ] && gh issue edit "$i" --add-label "$LABELS" || true
          done


  # ==========================================
  # JOB 2: MANUAL ISSUE FROM REPLY CONTEXT
  # ==========================================
  manual_issue_from_pr:
    # اعمال فیلترهای امنیتی و محدودسازی به PR ها
    if: |
      contains(github.event.comment.body, '/ai-fix') && (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
        github.event_name == 'pull_request_review_comment'
      ) && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'MEMBER'
      )
    runs-on: ubuntu-latest
    
    permissions:
      issues: write
      pull-requests: write 
      contents: read

    steps:
      - name: Extract Parent Context & Diff
        id: pr_context
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const isReviewComment = context.eventName === 'pull_request_review_comment';
            const pr_number = context.payload.pull_request?.number || context.issue.number;
            const triggerComment = context.payload.comment;
            let parentText = "";

            if (triggerComment.in_reply_to_id) {
              if (isReviewComment) {
                const parent = await github.rest.pulls.getReviewComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: triggerComment.in_reply_to_id
                });
                parentText = parent.data.body;
              } else {
                const parent = await github.rest.issues.getComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: triggerComment.in_reply_to_id
                });
                parentText = parent.data.body;
              }
            } else {
              parentText = triggerComment.body;
            }

            const diffData = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: pr_number,
              mediaType: { format: 'diff' }
            });
            
            // FIX: استفاده از core.setOutput برای دسترسی مستقیم در YAML
            core.setOutput('pr_url', `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${pr_number}`);
            core.setOutput('diff', diffData.data.slice(0, 15000)); 
            core.setOutput('parent_context', parentText.slice(0, 5000));

      - name: Acknowledge command
        env: { GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
        run: |
          # تعیین صحیح End-point بر اساس نوع کامنت
          if [ "${{ github.event_name }}" == "pull_request_review_comment" ]; then
            ENDPOINT="/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments"
          else
            ENDPOINT="/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"
          fi
          
          gh api --method POST -H "Accept: application/vnd.github+json" \
            $ENDPOINT \
            -f "body=🤖 AI OS received \`/ai-fix\`. Reading the reported context..." \
            -f "in_reply_to_id=${{ github.event.comment.id }}"

      - name: Generate Issue with Gemini
        id: gen_issue
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489
        env: { GEMINI_CLI_TRUST_WORKSPACE: "true" }
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.1-flash-lite
          prompt: |
            You are an expert QA engineer. A user replied to a bot's code review or bug report with the command `/ai-fix`.
            
            HERE IS THE EXACT BUG REPORT/REVIEW FROM THE BOT (Parent Comment):
            ---
            ${{ steps.pr_context.outputs.parent_context }}
            ---
            
            HERE IS THE PR CODE DIFF FOR CONTEXT:
            ---
            ${{ steps.pr_context.outputs.diff }}
            ---

            TASK: Create a highly professional GitHub Issue based STRICTLY on the "BUG REPORT FROM THE BOT" provided above. Use the diff only to understand the code context.
            
            Output ONLY valid JSON with exactly this structure:
            {
              "title": "Concise bug title based on the report",
              "body": "Detailed markdown body explaining the bug reported by the bot, expected vs actual behavior, and referencing the problematic code snippet.",
              "labels": ["bug"]
            }

      - name: Validate, Create Issue & Reply to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESPONSE: ${{ steps.gen_issue.outputs.summary }}
          PR_NUM: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          set -euo pipefail
          
          if [ "${{ github.event_name }}" == "pull_request_review_comment" ]; then
            ENDPOINT="/repos/${{ github.repository }}/pulls/$PR_NUM/comments"
          else
            ENDPOINT="/repos/${{ github.repository }}/issues/$PR_NUM/comments"
          fi

          if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            gh api --method POST -H "Accept: application/vnd.github+json" $ENDPOINT -f "body=❌ AI failed to parse JSON response." -f "in_reply_to_id=${{ github.event.comment.id }}"
            exit 1
          fi

          # FIX: اعتبارسنجی دقیق Schema
          TITLE=$(echo "$RESPONSE" | jq -r '.title // empty')
          BODY=$(echo "$RESPONSE" | jq -r '.body // empty')
          LABELS=$(echo "$RESPONSE" | jq -r 'if (.labels | type) == "array" then (.labels | join(",")) else empty end')

          if [ -z "$TITLE" ] || [ -z "$BODY" ]; then
            gh api --method POST -H "Accept: application/vnd.github+json" $ENDPOINT -f "body=❌ AI generated invalid issue fields (missing title or body)." -f "in_reply_to_id=${{ github.event.comment.id }}"
            exit 1
          fi

          FOOTER="\n\n---\n🤖 *This issue was automatically generated via \`/ai-fix\` from [PR #${PR_NUM}](${{ steps.pr_context.outputs.pr_url }})*"
          FULL_BODY="${BODY}${FOOTER}"

          ISSUE_URL=$(gh issue create --title "$TITLE" --body "$FULL_BODY" --label "$LABELS")
          
          gh api --method POST -H "Accept: application/vnd.github+json" \
            $ENDPOINT \
            -f "body=✅ Successfully created issue: ${ISSUE_URL}" \
            -f "in_reply_to_id=${{ github.event.comment.id }}"
